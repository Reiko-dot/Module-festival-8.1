<!DOCTYPE html>
<html lang="nl" data-theme="dark" data-lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>U Festival – Line-up</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#f03228">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="U Festival">
    <link rel="apple-touch-icon" href="../icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <script>
        (function () {
            var t = localStorage.getItem('ufestival-theme') || 'dark';
            var l = localStorage.getItem('ufestival-lang') || 'nl';
            document.documentElement.dataset.theme = t;
            document.documentElement.dataset.lang = l;
            document.documentElement.lang = l === 'nl' ? 'nl' : 'en';
        })();
    </script>
    <style>
        .perf-block.has-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .perf-block.has-link::after {
            content: ' ›';
            opacity: 0.7;
            font-weight: 700;
            margin-left: 2px;
        }

        .perf-block.has-link:hover,
        .perf-block.has-link:active {
            filter: brightness(1.2);
        }

        .schedule-filters {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            margin: 0 18px 16px;
            border-radius: 28px;
            background: rgba(8, 16, 50, 0.96) !important;
            border: 1px solid rgba(36, 115, 255, 0.35) !important;
            box-shadow: 0 24px 42px rgba(3, 10, 36, 0.45) !important;
        }

        .stage-filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            flex: 1;
        }

        .stage-filter-btn,
        .stage-filter-reset-btn {
            appearance: none;
            -webkit-appearance: none;
            padding: 14px 20px;
            min-width: 110px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.24) !important;
            background: rgba(31, 61, 138, 0.95) !important;
            color: #e8f2ff !important;
            font-family: 'Sansation', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            box-shadow: 0 10px 26px rgba(18, 69, 156, 0.16) !important;
            transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, color 0.15s ease;
        }

        .stage-filter-btn:hover,
        .stage-filter-reset-btn:hover,
        .stage-filter-btn:focus-visible,
        .stage-filter-reset-btn:focus-visible {
            transform: translateY(-1px);
            background: rgba(69, 119, 236, 0.95);
            border-color: rgba(105, 170, 255, 0.55);
            box-shadow: 0 14px 30px rgba(41, 94, 214, 0.22);
        }

        .stage-filter-btn.active {
            background: linear-gradient(135deg, #2785ff 0%, #3fabff 100%) !important;
            border-color: #82bfff !important;
            color: #fff !important;
            box-shadow: 0 0 28px rgba(49, 126, 255, 0.6) !important;
        }

        .stage-filter-reset-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #d9e5ff;
            border-color: rgba(255, 255, 255, 0.26);
        }

        .stage-filter-reset-btn:disabled {
            opacity: 0.45;
            cursor: default;
            box-shadow: none;
        }

        /* Theme-aware filter button styling */
        [data-theme="light"] .stage-filter-btn,
        [data-theme="light"] .stage-filter-reset-btn {
            background: rgba(240, 245, 250, 0.95) !important;
            color: #1e40af !important;
            border-color: rgba(30, 64, 175, 0.25) !important;
        }

        [data-theme="light"] .stage-filter-btn.active {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%) !important;
            color: #ffffff !important;
            border-color: #60a5fa !important;
        }

        [data-theme="light"] .stage-filter-reset-btn:disabled {
            background: rgba(200, 210, 220, 0.5) !important;
            color: #64748b !important;
            opacity: 0.6 !important;
        }

        [data-theme="light"] .schedule-filters {
            background: rgba(220, 80, 65, 0.12) !important;
            border-color: rgba(220, 80, 65, 0.3) !important;
            box-shadow: none !important;
        }
    </style>
</head>

<body>
    <div class="app-screen">
        <header class="app-header">
            <div class="header-left">
                <img class="brand-logo" src="../svg_files/logo_white.svg" alt="U Festival logo">
                <span class="title-text">FESTIVAL</span>
            </div>
            <div class="header-right">
                <button class="icon-btn theme-btn" id="theme-toggle" aria-label="Schakel lichte modus">
                    <img src="../svg_files/light_mode.svg" alt="Toggle theme">
                </button>
                <button class="icon-btn lang-btn" id="lang-toggle" data-label="NL" aria-label="Switch to English">
                    <img class="flag-logo" id="flag-icon" src="../svg_files/nederland_flag.svg" alt="NL">
                </button>
            </div>
        </header>

        <main class="schedule-outer">
            <div class="sched-header">
                <span class="section-label" data-i18n="schedule.label">LINE-UP</span>
                <h2 class="section-title" data-i18n="schedule.title">SCHEMA</h2>
            </div>

            <div class="day-toggle-wrap">
                <div class="day-toggle">
                    <button class="day-btn active" data-day="saturday" data-i18n="schedule.saturday">Zaterdag</button>
                    <button class="day-btn" data-day="sunday" data-i18n="schedule.sunday">Zondag</button>
                </div>
            </div>

            <div class="schedule-filters" style="display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 18px 10px; background: rgba(240, 50, 40, 0.15); border: 1px solid rgba(240, 50, 40, 0.25); border-radius: 8px; box-shadow: none;">
                <div class="stage-filter-group" aria-label="Stage filters" style="display: flex; flex-wrap: wrap; gap: 6px;">
                    <button type="button" class="stage-filter-btn active" data-stage="Poton" style="display:inline-flex; align-items:center; justify-content:center; padding: 4px 8px; min-width: 45px; height: 28px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.24); background: rgba(31,61,138,0.95); color: #e8f2ff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px;">Poton</button>
                    <button type="button" class="stage-filter-btn active" data-stage="The Lake" style="display:inline-flex; align-items:center; justify-content:center; padding: 4px 8px; min-width: 45px; height: 28px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.24); background: rgba(31,61,138,0.95); color: #e8f2ff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px;">The Lake</button>
                    <button type="button" class="stage-filter-btn active" data-stage="The Club" style="display:inline-flex; align-items:center; justify-content:center; padding: 4px 8px; min-width: 45px; height: 28px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.24); background: rgba(31,61,138,0.95); color: #e8f2ff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px;">The Club</button>
                    <button type="button" class="stage-filter-btn active" data-stage="Hanggar" style="display:inline-flex; align-items:center; justify-content:center; padding: 4px 8px; min-width: 45px; height: 28px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.24); background: rgba(31,61,138,0.95); color: #e8f2ff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px;">Hanggar</button>
                    <button type="button" id="stage-filter-reset" class="stage-filter-reset-btn" disabled style="display:inline-flex; align-items:center; justify-content:center; padding: 4px 8px; min-width: 45px; height: 28px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.26); background: rgba(255,255,255,0.08); color: #d9e5ff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px;">Reset</button>
                </div>
            </div>

            <div class="timeline-scroll" id="timeline-scroll"></div>
        </main>

        <nav class="bottom-nav" aria-label="Navigatie">
            <a href="../index.html" class="nav-item">
                <img class="nav-logo" src="../svg_files/home_logo.svg" alt="Home">
                <span class="nav-label" data-i18n="nav.home">Home</span>
            </a>
            <a href="info.html" class="nav-item">
                <img class="nav-logo" src="../svg_files/info_logo.svg" alt="Info">
                <span class="nav-label" data-i18n="nav.info">Info</span>
            </a>
            <a href="schedule.html" class="nav-item active">
                <img class="nav-logo" src="../svg_files/music_logo.svg" alt="Line-up">
                <span class="nav-label" data-i18n="nav.lineup">Line-up</span>
            </a>
            <a href="map.html" class="nav-item">
                <img class="nav-logo" src="../svg_files/map_logo.svg" alt="Kaart">
                <span class="nav-label" data-i18n="nav.map">Kaart</span>
            </a>
        </nav>
    </div>

    <script>

                    ]

                {

                        { label: 'DJ set 1', cls: 'hanggar', left: 0,  width: 4 },
                        { label: 'DJ set 2', cls: 'hanggar', left: 5,  width: 5 },
                        { label: 'DJ set 3', cls: 'hanggar', left: 12, width: 5 },

                        { label: 'DJ set 5', cls: 'hanggar', left: 26, width: 6 },
                        { label: 'DJ set 6', cls: 'hanggar', left: 33, width: 6 },
                        { label: 'DJ set 7', cls: 'hanggar', left: 40, width: 7 },
                        { label: 'DJ set 8', cls: 'hanggar', left: 49, width: 7 },
                    ]
                },
            ],
            sunday: [
                {
                    stage: 'Poton', perfs: [
                        { label: 'Martin Garrix',    cls: 'poton', left: 3,  width: 7, link: '../artist.html?id=2'  },
                        { label: 'Within Temptation',cls: 'poton', left: 18, width: 8, link: '../artist.html?id=4'  },
                        { label: "Chef'Special",     cls: 'poton', left: 28, width: 6, link: '../artist.html?id=6'  },
                        { label: 'Eefje de Visser',  cls: 'poton', left: 38, width: 7, link: '../artist.html?id=9'  },
                        { label: 'Spinvis',          cls: 'poton', left: 49, width: 7, link: '../artist.html?id=11' },
                    ]
                },
                {
                    stage: 'The Lake', perfs: [
                        { label: 'Talent set 1', cls: 'lake', left: 0,  width: 4 },
                        { label: 'Talent set 2', cls: 'lake', left: 6,  width: 6 },
                        { label: 'Talent set 3', cls: 'lake', left: 16, width: 6 },
                        { label: 'Talent set 4', cls: 'lake', left: 26, width: 4 },
                        { label: 'Talent set 5', cls: 'lake', left: 34, width: 6 },
                        { label: 'Talent set 6', cls: 'lake', left: 44, width: 6 },
                    ]
                },
                {
                    stage: 'The Club', perfs: [
                        { label: 'Comedy',    cls: 'club', left: 6,  width: 6 },
                        { label: 'Lecture',   cls: 'club', left: 14, width: 6 },
                        { label: 'Theater',   cls: 'club', left: 26, width: 6 },
                        { label: 'Movie',     cls: 'club', left: 32, width: 6 },
                        { label: 'Magic Show',cls: 'club', left: 42, width: 6 },
                    ]
                },
                {
                    stage: 'Hanggar', perfs: [
                        { label: 'DJ set 1', cls: 'hanggar', left: 0,  width: 3 },
                        { label: 'DJ set 2', cls: 'hanggar', left: 4,  width: 5 },
                        { label: 'DJ set 3', cls: 'hanggar', left: 13, width: 6 },
                        { label: 'DJ set 4', cls: 'hanggar', left: 18, width: 6 },
                        { label: 'DJ set 5', cls: 'hanggar', left: 26, width: 6 },
                        { label: 'DJ set 6', cls: 'hanggar', left: 33, width: 5 },
                        { label: 'DJ set 7', cls: 'hanggar', left: 40, width: 7 },
                        { label: 'DJ set 8', cls: 'hanggar', left: 48, width: 8 },
                    ]
                },
            ]
        };

        // ─── Builder ───────────────────────────────────────────────────────────────
        const SLOTS = 56;
        const START_HOUR = 10;

        function buildTimeRuler() {
            const ruler = document.createElement('div');
            ruler.className = 'time-ruler';
            ruler.innerHTML = '<div class="time-ruler-spacer"></div>';
            for (let i = 0; i < SLOTS; i++) {
                const totalMin = START_HOUR * 60 + i * 15;
                const h = String(Math.floor(totalMin / 60)).padStart(2, '0');
                const m = String(totalMin % 60).padStart(2, '0');
                ruler.innerHTML += `<div class="time-tick">${h}:${m}</div>`;
            }
            return ruler;
        }

        function buildStageRow({ stage, perfs }) {
            const row = document.createElement('div');
            row.className = 'stage-row';
            row.dataset.stage = stage;

            const label = document.createElement('div');
            label.className = 'stage-label';
            label.textContent = stage;

            const cells = document.createElement('div');
            cells.className = 'stage-cells';
            cells.innerHTML = '<div class="cell-bg"></div>'.repeat(SLOTS);

            for (const p of perfs) {
                const el = p.link ? document.createElement('a') : document.createElement('div');
                if (p.link) el.href = p.link;
                el.className = `perf-block ${p.cls}${p.link ? ' has-link' : ''}`;
                el.style.cssText = `left:calc(${p.left}*var(--slot)); width:calc(${p.width}*var(--slot))`;
                el.textContent = p.label;
                cells.appendChild(el);
            }

            row.appendChild(label);
            row.appendChild(cells);
            return row;
        }

        function buildDaySchedule(dayId, stages, hidden) {
            const wrap = document.createElement('div');
            wrap.className = 'day-schedule' + (hidden ? ' hidden' : '');
            wrap.id = dayId;

            const grid = document.createElement('div');
            grid.className = 'timeline-grid';
            grid.appendChild(buildTimeRuler());
            stages.forEach(s => grid.appendChild(buildStageRow(s)));

            wrap.appendChild(grid);
            return wrap;
        }

        // ─── Filters ───────────────────────────────────────────────────────────────
        let selectedStage = null;

        function updateStageButtons() {
            const buttons = document.querySelectorAll('.stage-filter-btn');
            buttons.forEach(btn => {
                const stage = btn.dataset.stage;
                const active = !selectedStage || selectedStage === stage;
                btn.classList.toggle('active', active);
                btn.setAttribute('aria-pressed', String(active));
            });
            const resetButton = document.getElementById('stage-filter-reset');
            if (resetButton) {
                resetButton.disabled = !selectedStage;
            }
        }

        function applyScheduleFilters() {
            document.querySelectorAll('.stage-row').forEach(row => {
                const stage = row.dataset.stage;
                const visible = !selectedStage || selectedStage === stage;
                row.style.display = visible ? '' : 'none';
                row.classList.toggle('stage-selected', selectedStage === stage);
            });
            document.querySelectorAll('.day-schedule').forEach(schedule => {
                const visibleRows = Array.from(schedule.querySelectorAll('.stage-row')).some(row => row.style.display !== 'none');
                schedule.style.display = visibleRows ? '' : 'none';
            });
        }

        function setupStageFilters() {
            const buttons = document.querySelectorAll('.stage-filter-btn');
            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    selectedStage = button.dataset.stage;
                    applyScheduleFilters();
                    updateStageButtons();
                });
            });

            const resetButton = document.getElementById('stage-filter-reset');
            if (resetButton) {
                resetButton.addEventListener('click', () => {
                    selectedStage = null;
                    applyScheduleFilters();
                    updateStageButtons();
                });
            }

            updateStageButtons();
        }

        // ─── Render ────────────────────────────────────────────────────────────────
        const container = document.getElementById('timeline-scroll');
        container.appendChild(buildDaySchedule('saturday', SCHEDULE.saturday, false));
        container.appendChild(buildDaySchedule('sunday',   SCHEDULE.sunday,   true));
        setupStageFilters();
        applyScheduleFilters();
    </script>

    <script>
    (function () {
        function updateFilterButtonTheme(theme) {
            const buttons = document.querySelectorAll('.stage-filter-btn, .stage-filter-reset-btn');
            const filterContainer = document.querySelector('.schedule-filters');
            if (theme === 'light') {
                if (filterContainer) {
                    filterContainer.style.background = 'rgba(220, 80, 65, 0.12)';
                    filterContainer.style.borderColor = 'rgba(220, 80, 65, 0.3)';
                    filterContainer.style.boxShadow = 'none';
                }
                buttons.forEach(btn => {
                    btn.style.background = 'rgba(240, 245, 250, 0.95)';
                    btn.style.color = '#1e40af';
                    btn.style.borderColor = 'rgba(30, 64, 175, 0.25)';
                    btn.style.boxShadow = 'none';
                });
                const activeButtons = document.querySelectorAll('.stage-filter-btn.active');
                activeButtons.forEach(btn => {
                    btn.style.background = 'linear-gradient(135deg, #2563eb 0%, #3b82f6 100%)';
                    btn.style.color = '#ffffff';
                    btn.style.borderColor = '#60a5fa';
                    btn.style.boxShadow = 'none';
                });
            } else {
                if (filterContainer) {
                    filterContainer.style.background = 'rgba(240, 50, 40, 0.15)';
                    filterContainer.style.borderColor = 'rgba(240, 50, 40, 0.25)';
                    filterContainer.style.boxShadow = 'none';
                }
                buttons.forEach(btn => {
                    btn.style.background = 'rgba(31,61,138,0.95)';
                    btn.style.color = '#e8f2ff';
                    btn.style.borderColor = 'rgba(255,255,255,0.24)';
                    btn.style.boxShadow = 'none';
                });
                const activeButtons = document.querySelectorAll('.stage-filter-btn.active');
                activeButtons.forEach(btn => {
                    btn.style.background = 'linear-gradient(135deg, #2785ff 0%, #3fabff 100%)';
                    btn.style.color = '#fff';
                    btn.style.borderColor = '#82bfff';
                    btn.style.boxShadow = 'none';
                });
            }
        }

        function syncFlag(lang) {
            var flagIcon = document.getElementById('flag-icon');
            if (flagIcon) { 
                flagIcon.src = lang === 'en' ? '../svg_files/uk_flag.svg' : '../svg_files/nederland_flag.svg'; 
                flagIcon.alt = lang === 'en' ? 'EN' : 'NL'; 
            }
            var langBtn = document.getElementById('lang-toggle');
            if (langBtn) {
                langBtn.dataset.label = lang === 'en' ? 'EN' : 'NL';
                langBtn.setAttribute('aria-label', lang === 'en' ? 'Schakel naar Nederlands' : 'Switch to English');
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            var lang = document.documentElement.dataset.lang || 'nl';
            syncFlag(lang);
            var theme = document.documentElement.dataset.theme || 'dark';
            updateFilterButtonTheme(theme);

            var themeBtn = document.getElementById('theme-toggle');
            if (themeBtn) {
                themeBtn.addEventListener('click', function () {
                    var newTheme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
                    updateFilterButtonTheme(newTheme);
                });
            }

            var langBtn = document.getElementById('lang-toggle');
            if (langBtn) {
                langBtn.addEventListener('click', function () {
                    var newLang = document.documentElement.dataset.lang === 'en' ? 'nl' : 'en';
                    syncFlag(newLang);
                });
            }

            new MutationObserver(function () {
                syncFlag(document.documentElement.dataset.lang || 'nl');
            }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-lang'] });
        });
    })();
    </script>
    <script src="../app.js"></script>
</body>

</html>
