<!DOCTYPE html>
<html lang="nl" data-theme="dark" data-lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>U Festival – Kaart</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#f03228">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="U Festival">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
  <script>
    (function () {
      var t = localStorage.getItem('ufestival-theme') || 'dark';
      var l = localStorage.getItem('ufestival-lang') || 'nl';
      document.documentElement.dataset.theme = t;
      document.documentElement.dataset.lang = l;
      document.documentElement.lang = l === 'nl' ? 'nl' : 'en';
    })();
  </script>
  <style>
    /* ── Map-specific styles ── */
    .map-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #2c5a24;
    }

    .map-viewport {
      width: 100%; height: 100%;
      overflow: hidden;
      position: relative;
      touch-action: none;
      cursor: grab;
    }
    .map-viewport:active { cursor: grabbing; }

    .map-canvas {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    .map-base {
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .markers-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .marker {
      position: absolute;
      pointer-events: all;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter .12s;
    }
    .marker:active { filter: brightness(1.35) drop-shadow(0 0 8px rgba(240,50,40,.7)); }

    .marker img {
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.55));
    }

    .marker-stage img { width: 44px; height: 44px; }
    .marker-facility img { width: 32px; height: 32px; }
    .marker-entrance img { width: 88px; height: 24px; }

    .marker-user { pointer-events: none !important; z-index: 50; }
    .user-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #3a7dff;
      border: 3px solid #fff;
      box-shadow: 0 0 0 6px rgba(58,125,255,.22);
      animation: pulse-loc 2.2s ease-in-out infinite;
    }
    @keyframes pulse-loc {
      0%,100% { box-shadow: 0 0 0 4px rgba(58,125,255,.22); }
      50%      { box-shadow: 0 0 0 14px rgba(58,125,255,.06); }
    }

    .map-controls {
      position: absolute;
      right: 14px;
      bottom: 14px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 90;
    }
    .ctrl-btn {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--surface, #303030);
      border: 1px solid var(--border, rgba(255,255,255,.08));
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
      color: var(--text, #f0f0f0);
      transition: background .12s, transform .1s;
    }
    .ctrl-btn:active { transform: scale(.9); }
    .ctrl-btn.locate-active { background: #f03228; color: #fff; border-color: #f03228; }
    .ctrl-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .map-legend {
      position: absolute;
      left: 10px;
      bottom: 12px;
      background: var(--surface, #303030);
      border: 1px solid var(--border, rgba(255,255,255,.08));
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      padding: 8px 10px;
      z-index: 90;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 14px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--text, #f0f0f0); white-space: nowrap;
    }
    .legend-item img {
      width: 16px; height: 16px;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .legend-item.l-entrance img { width: 24px; height: 7px; }

    .info-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .info-overlay.visible { opacity: 1; pointer-events: all; }

    .info-panel {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 210;
      background: var(--surface, #303030);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,0,.67,0);
      max-height: 76vh;
      display: flex; flex-direction: column;
      padding-bottom: calc(16px + var(--safe-bot));
    }
    .info-panel.open {
      transform: translateY(0);
      transition-timing-function: cubic-bezier(.33,1,.68,1);
      box-shadow: 0 -6px 40px rgba(0,0,0,.55);
    }

    .panel-handle {
      width: 36px; height: 4px;
      background: var(--bg3, #2e2e2e);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .panel-header {
      padding: 14px 16px 8px;
      flex-shrink: 0;
    }
    .panel-marker-row { display: flex; align-items: center; gap: 12px; }
    .panel-icon-wrap { flex-shrink: 0; }
    .panel-icon-wrap img { display: block; }
    .panel-title { font-size: 18px; font-weight: 700; color: var(--text, #f0f0f0); }
    .panel-sub   { font-size: 12px; color: var(--text-muted, #888); margin-top: 2px; }
    .panel-divider { height: 1px; background: var(--border, rgba(255,255,255,.08)); margin: 0 16px; flex-shrink: 0; }
    .panel-body  { padding: 0 16px; overflow-y: auto; flex: 1; }

    .section-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: #f03228;
      margin: 14px 0 6px;
    }

    .acts-list { display: flex; flex-direction: column; }
    .act-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border, rgba(255,255,255,.08));
    }
    .act-row:last-child { border-bottom: none; }
    .act-row.act-now {
      background: rgba(240,50,40,.07);
      border-radius: 8px;
      padding: 9px 8px;
      margin: 0 -8px;
    }
    .act-time {
      font-size: 12px; font-weight: 700;
      color: var(--text-muted, #888); min-width: 42px;
    }
    .act-row.act-now .act-time { color: #f03228; }
    .act-info { flex: 1; }
    .act-artist { font-size: 14px; font-weight: 700; color: var(--text, #f0f0f0); }
    .act-end    { font-size: 11px; color: var(--text-muted, #888); margin-top: 1px; }

    .panel-day-toggle {
      display: flex; gap: 6px;
      margin: 12px 0 8px;
    }
    .panel-day-btn {
      flex: 1;
      padding: 6px 0;
      border-radius: 8px;
      border: 1px solid var(--border, rgba(255,255,255,.08));
      background: var(--bg2, #242424);
      color: var(--text-muted, #888);
      font-family: 'Sansation', sans-serif;
      font-size: 12px; font-weight: 700;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .panel-day-btn.active {
      background: #f03228;
      color: #fff;
      border-color: #f03228;
    }
    .badge {
      font-size: 9px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      border-radius: 4px; padding: 2px 6px;
    }
    .badge-now  { background: #f03228; color: #fff; }
    .badge-next { background: #69008b; color: #fff; }

    .fac-desc {
      font-size: 13px; color: var(--text-muted, #888);
      line-height: 1.6; padding: 10px 0 14px;
    }
  </style>
</head>

function applyI18n() {
  lang = document.documentElement.dataset.lang || 'nl';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = tr(el.dataset.i18n);

/* ─── Schedule ──────────────────────────────────────────────── */
// Times derived from schedule.html (START_HOUR=10, slots of 15 min each)
const SCHEDULE = {
  stage1: {
    nameNl: 'Poton', nameEn: 'Poton',
    img: '../svg_files/marker_stage1_ponton.svg',
    sat: [
      {time:'10:30', end:'12:00', artist:'Armin van Buuren'},
      {time:'13:00', end:'14:30', artist:'Kensington'},

function timeToMin(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
function getNowMin() {
  const d = new Date();
  return d.getHours()*60 + d.getMinutes();
}
function getActStatus(acts) {
  const now = getNowMin();
  let curIdx = -1, nxtIdx = -1;
  for (let i = 0; i < acts.length; i++) {
    const s = timeToMin(acts[i].time);
    const e = timeToMin(acts[i].end) || 24*60;
    if (now >= s && now < e) { curIdx = i; nxtIdx = i+1 < acts.length ? i+1 : -1; break; }
    if (now < s && nxtIdx === -1) { nxtIdx = i; }
  }
  return { curIdx, nxtIdx };
}

/* ─── Pan / Zoom Engine ─────────────────────────────────────── */
const viewport  = document.getElementById('viewport');
const canvas    = document.getElementById('canvas');
const mapBase   = document.getElementById('map-base');
const markersLy = document.getElementById('markers-layer');

// Intrinsic map dimensions (SVG viewBox)
const MAP_W = 2330.58;
const MAP_H = 1353.19;

let zoom = 1, minZoom = 0.25, maxZoom = 6;
let panX = 0, panY = 0;
let baseW = 0, baseH = 0;

function initMap() {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  if (!vw || !vh) return;
  const fit = Math.min(vw / MAP_W, vh / MAP_H);
  baseW = MAP_W * fit;
  baseH = MAP_H * fit;
  mapBase.style.width  = baseW + 'px';
  mapBase.style.height = baseH + 'px';
  markersLy.style.width  = baseW + 'px';
  markersLy.style.height = baseH + 'px';
  zoom = 1;
  panX = (vw - baseW) / 2;
  panY = (vh - baseH) / 2;
  // min zoom: map fills at least 80% of narrowest viewport dimension
  minZoom = Math.min(vw, vh) / Math.max(baseW, baseH) * 0.8;
  minZoom = Math.max(0.2, Math.min(1, minZoom));
  applyTransform();
}

function applyTransform() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  updateMarkers();
}

function updateMarkers() {
  const inv = 1 / zoom;
  document.querySelectorAll('.marker').forEach(m => {
    m.style.transform = `translate(-50%,-50%) scale(${inv})`;
  });
}

function clampPan(x, y) {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const sw = baseW * zoom;
  const sh = baseH * zoom;
  const pad = 80;
  return [
    Math.max(vw - sw - pad, Math.min(pad, x)),
    Math.max(vh - sh - pad, Math.min(pad, y)),
  ];
}

function zoomAt(nz, cx, cy) {
  nz = Math.max(minZoom, Math.min(maxZoom, nz));
  const f = nz / zoom;
  panX = cx - f * (cx - panX);
  panY = cy - f * (cy - panY);
  zoom = nz;
  [panX, panY] = clampPan(panX, panY);
  applyTransform();
}

/* Mouse wheel */
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const r = viewport.getBoundingClientRect();
  zoomAt(zoom * (e.deltaY > 0 ? 0.85 : 1.18), e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

/* Mouse drag */
let dragging = false, dsx, dsy, dpx, dpy;
viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true; dsx = e.clientX; dsy = e.clientY; dpx = panX; dpy = panY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  [panX, panY] = clampPan(dpx + e.clientX - dsx, dpy + e.clientY - dsy);
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; });

/* Touch drag + pinch */
let tBase = [], pinchDist0 = 0, pinchZoom0 = 1, pinchPan0 = [0,0], pinchMid0 = [0,0];
let touchPanBase = [0,0];

viewport.addEventListener('touchstart', e => {
  tBase = Array.from(e.touches);
  if (tBase.length === 1) {
    touchPanBase = [panX, panY];
  } else if (tBase.length === 2) {
    const dx = tBase[1].clientX - tBase[0].clientX;
    const dy = tBase[1].clientY - tBase[0].clientY;
    pinchDist0 = Math.hypot(dx, dy);
    pinchZoom0 = zoom;
    pinchPan0  = [panX, panY];
    const r = viewport.getBoundingClientRect();
    pinchMid0 = [
      (tBase[0].clientX + tBase[1].clientX) / 2 - r.left,
      (tBase[0].clientY + tBase[1].clientY) / 2 - r.top,
    ];
  }
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  e.preventDefault();
  const tc = Array.from(e.touches);
  if (tc.length === 1 && tBase.length === 1) {
    const dx = tc[0].clientX - tBase[0].clientX;
    const dy = tc[0].clientY - tBase[0].clientY;
    [panX, panY] = clampPan(touchPanBase[0]+dx, touchPanBase[1]+dy);
    applyTransform();
  } else if (tc.length === 2) {
    const dx = tc[1].clientX - tc[0].clientX;
    const dy = tc[1].clientY - tc[0].clientY;
    const dist = Math.hypot(dx, dy);
    const nz = Math.max(minZoom, Math.min(maxZoom, pinchZoom0 * dist / pinchDist0));
    const f = nz / pinchZoom0;
    panX = pinchMid0[0] - f * (pinchMid0[0] - pinchPan0[0]);
    panY = pinchMid0[1] - f * (pinchMid0[1] - pinchPan0[1]);
    zoom = nz;
    [panX, panY] = clampPan(panX, panY);
    applyTransform();
  }
}, { passive: false });

viewport.addEventListener('touchend', e => {
  tBase = Array.from(e.touches);
  if (tBase.length === 1) touchPanBase = [panX, panY];
}, { passive: true });

/* Zoom buttons */
document.getElementById('btn-zoom-in').addEventListener('click', () =>
  zoomAt(zoom * 1.45, viewport.clientWidth/2, viewport.clientHeight/2));
document.getElementById('btn-zoom-out').addEventListener('click', () =>
  zoomAt(zoom / 1.45, viewport.clientWidth/2, viewport.clientHeight/2));

/* ─── GPS / User Location ───────────────────────────────────── */
// Festival GPS bounds — Strijkviertel, Utrecht (calibrate precise corners if needed)
const BOUNDS = { latTop:52.0630, latBottom:52.0535, lngLeft:5.0815, lngRight:5.0995 };

let watchId    = null;
let followMode = false;
const btnLoc   = document.getElementById('btn-locate');
const mUser    = document.getElementById('m-user');

function gpsToPct(lat, lng) {
  const x = (lng - BOUNDS.lngLeft)    / (BOUNDS.lngRight  - BOUNDS.lngLeft)    * 100;
  const y = (BOUNDS.latTop - lat)     / (BOUNDS.latTop    - BOUNDS.latBottom)  * 100;
  return { x, y };
}

function placeUser(lat, lng) {
  const { x, y } = gpsToPct(lat, lng);
  mUser.style.left    = x + '%';
  mUser.style.top     = y + '%';
  mUser.style.display = 'flex';
  updateMarkers(); // re-apply counter-scale to user dot too
}

function centerOnUser(lat, lng) {
  const { x, y } = gpsToPct(lat, lng);
  const mx = (x / 100) * baseW;
  const my = (y / 100) * baseH;
  const tz = Math.max(zoom, 2.0);
  panX = viewport.clientWidth  / 2 - mx * tz;
  panY = viewport.clientHeight / 2 - my * tz;
  zoom = tz;
  [panX, panY] = clampPan(panX, panY);
  applyTransform();
}

function startLocate() {
  if (!('geolocation' in navigator)) { showToast(tr('loc.unavail')); return; }
  followMode = true;
  btnLoc.classList.add('locate-active');
  showToast(tr('loc.searching'));
  watchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      placeUser(lat, lng);
      if (followMode) { centerOnUser(lat, lng); followMode = false; showToast(tr('loc.tracking')); }
    },
    err => {
      btnLoc.classList.remove('locate-active');
      followMode = false;
      showToast(err.code === err.PERMISSION_DENIED ? tr('loc.denied') : tr('loc.unavail'));
      watchId = null;
    },
    { enableHighAccuracy: true, maximumAge: 4000, timeout: 12000 }
  );
}

function stopLocate() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  btnLoc.classList.remove('locate-active');
  followMode = false;
  mUser.style.display = 'none';
}

btnLoc.addEventListener('click', () => {
  if (watchId !== null) stopLocate();
  else startLocate();
});

/* ─── Info Panel ────────────────────────────────────────────── */
const overlay   = document.getElementById('overlay');
const infoPanel = document.getElementById('info-panel');
const panelIcon = document.getElementById('panel-icon');
const panelIconWrap = document.getElementById('panel-icon-wrap');
const panelTitle= document.getElementById('panel-title');
const panelSub  = document.getElementById('panel-sub');
const panelBody = document.getElementById('panel-body');

function openPanel(el) {
  const type = el.dataset.type;
  const id   = el.dataset.id;

  if (type === 'stage') {
    const d = SCHEDULE[id];
    if (!d) return;
    panelIcon.src    = d.img;
    panelIcon.style.width  = '44px';
    panelIcon.style.height = '44px';
    panelTitle.textContent = lang === 'en' ? d.nameEn : d.nameNl;
    panelSub.textContent   = 'Strijkviertel, Utrecht';
    renderSchedule(d);
  } else {
    const f = FAC_MAP[type];
    if (!f) return;
    panelIcon.src = f.img;
    if (f.imgWide) {
      panelIcon.style.width  = '80px';
      panelIcon.style.height = '22px';
    } else {
      panelIcon.style.width  = '44px';
      panelIcon.style.height = '44px';
    }
    panelTitle.textContent = tr(f.prefix + '.title');
    panelSub.textContent   = tr(f.prefix + '.sub');
    panelBody.innerHTML = `<p class="fac-desc">${tr(f.prefix + '.desc')}</p>`;
  }

  infoPanel.classList.add('open');
  overlay.classList.add('visible');
}

function closePanel() {
  infoPanel.classList.remove('open');
  overlay.classList.remove('visible');
}

overlay.addEventListener('click', closePanel);

// Swipe down to close panel
let panelTouchY0 = 0;
infoPanel.addEventListener('touchstart', e => {
  panelTouchY0 = e.touches[0].clientY;
}, { passive: true });
infoPanel.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - panelTouchY0;
  if (dy > 60) closePanel();
}, { passive: true });

let _scheduleStageData = null;
let _scheduleDay = 'sat';

function renderSchedule(stageData) {
  _scheduleStageData = stageData;
  const satLabel = lang === 'en' ? 'Saturday' : 'Zaterdag';
  const sunLabel = lang === 'en' ? 'Sunday'   : 'Zondag';

  const acts = stageData[_scheduleDay] || [];
  const { curIdx, nxtIdx } = getActStatus(acts);

  let html = `
    <div class="panel-day-toggle">
      <button class="panel-day-btn${_scheduleDay==='sat'?' active':''}" data-day="sat">${satLabel}</button>
      <button class="panel-day-btn${_scheduleDay==='sun'?' active':''}" data-day="sun">${sunLabel}</button>
    </div>
    <div class="acts-list">`;

  acts.forEach((a, i) => {
    const isNow  = i === curIdx;
    const isNext = i === nxtIdx;
    html += `<div class="act-row${isNow ? ' act-now' : ''}">
      <span class="act-time">${a.time}</span>
      <div class="act-info">
        <div class="act-artist">${a.artist}</div>
        <div class="act-end">${a.end}</div>
      </div>
      ${isNow  ? `<span class="badge badge-now">${tr('panel.now')}</span>`  : ''}
      ${isNext && !isNow ? `<span class="badge badge-next">${tr('panel.next')}</span>` : ''}
    </div>`;
  });
  html += '</div>';
  panelBody.innerHTML = html;

  // Day toggle click handlers
  panelBody.querySelectorAll('.panel-day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      _scheduleDay = btn.dataset.day;
      renderSchedule(_scheduleStageData);
    });
  });
}

document.querySelectorAll('.marker[data-type]').forEach(m => {
  m.addEventListener('click', e => {
    e.stopPropagation();
    openPanel(m);
  });
});

/* ─── Toast ─────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ─── Theme Toggle ──────────────────────────────────────────── */
document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('ufestival-theme', next);
  document.getElementById('theme-toggle').classList.toggle('is-light', next === 'light');
});

/* ─── Language Toggle ───────────────────────────────────────── */
// Handled by app.js (same as info.html). The MutationObserver below
// reacts to data-lang changes and keeps translations + flag in sync.

/* ─── Init ──────────────────────────────────────────────────── */
window.addEventListener('resize', initMap);

function tryInit() {
  if (mapBase.complete && mapBase.naturalWidth > 0) {
    initMap();
  } else {
    mapBase.addEventListener('load', initMap, { once: true });
    mapBase.addEventListener('error', initMap, { once: true });
    // Fallback
    setTimeout(initMap, 400);
  }
}

tryInit();
applyI18n();

// Hook into existing app.js if present
if (typeof window.ufestivalInit === 'function') window.ufestivalInit();

<script>
(function () {
    function syncFlag(lang) {
        var flagIcon = document.getElementById('flag-icon');
        if (flagIcon) { flagIcon.src = lang === 'en' ? '../svg_files/uk_flag.svg' : '../svg_files/nederland_flag.svg'; flagIcon.alt = lang === 'en' ? 'EN' : 'NL'; }
        var langBtn = document.getElementById('lang-toggle');
        if (langBtn) {
            langBtn.dataset.label = lang === 'en' ? 'EN' : 'NL';
            langBtn.setAttribute('aria-label', lang === 'en' ? 'Schakel naar Nederlands' : 'Switch to English');
        }
    }
    document.addEventListener('DOMContentLoaded', function () {
        var lang = document.documentElement.dataset.lang || 'nl';
        syncFlag(lang);
        new MutationObserver(function () {
            var currentLang = document.documentElement.dataset.lang || 'nl';
            syncFlag(currentLang);
            if (typeof applyI18n === 'function') applyI18n();
        }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-lang'] });
    });
})();
</script>
