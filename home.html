<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>U Festival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-screen"> // Container for the entire app screen
        <header class="app-header"> 
            <div class="header-left">
                <img class="brand-logo" src="logo_white.svg" alt="U Festival logo">
                <span class="title-text"> Festival</span>
            </div>
            <div class="header-right">
                <button class="icon-button" aria-label="Tips">💡</button>
                <button class="icon-button" aria-label="Taal">🇳🇱</button>
            </div>
        </header>

        <main class="wireframe-body">
            <section class="wireframe-card hero-card">
                <span class="hero-label">WELCOME TO</span>
                <h1>U FESTIVAL</h1>
            </section>
            <section class="wireframe-card empty-card"></section>
            <section class="wireframe-card empty-card"></section>
        </main>

        <nav class="bottom-nav" aria-label="Navigatie">
            <button class="nav-item active">
                <span class="nav-icon"></span>
                <span>Home</span>
            </button>
            <button class="nav-item">
                <span class="nav-icon"></span>
                <span>Info</span>
            </button>
            <button class="nav-item">
                <span class="nav-icon"></span>
                <span>Line-up</span>
            </button>
            <button class="nav-item">
                <span class="nav-icon"></span>
                <span>Map</span>
            </button>
        </nav>
    </div> // End of app screen container
</body>
</html>
