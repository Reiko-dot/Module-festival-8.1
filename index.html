<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>U Festival</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="app-screen">
        <header class="app-header">
            <div class="header-left">
                <img class="brand-logo" src="svg_files/logo_white.svg" alt="U Festival logo">
                <span class="title-text">Festival</span>
            </div>
            <div class="header-right">
                <img class="nav-logo" src="svg_files/light_mode.svg" alt="Line-up">
                <img class="flag-logo" src="svg_files/nederland_flag.svg" alt="taal">
            </div>
        </header>

        <main class="wireframe-body">
            <section class="wireframe-card hero-card">
                <span class="hero-label">WELKOM OP HET</span>
                <h1>U FESTIVAL</h1>
            </section>
            <section class="wireframe-card empty-card"></section>
            <section class="wireframe-card empty-card"></section>
        </main>

        <nav class="bottom-nav" aria-label="Navigatie">
            <button class="nav-item active">
                <img class="nav-logo" src="svg_files/home_logo.svg" alt="Line-up">
            </button>
            <button class="nav-item">
                <img class="nav-logo" src="svg_files/info_logo.svg" alt="Line-up">
            </button>
            <button class="nav-item">
                <img class="nav-logo" src="svg_files/music_logo.svg" alt="Line-up">
            </button>
            <button class="nav-item">
                <img class="nav-logo" src="svg_files/map_logo.svg" alt="Line-up">
            </button>
        </nav>
    </div>
</body>

</html>
