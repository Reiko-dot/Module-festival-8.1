<!DOCTYPE html>
<html lang="nl" data-theme="dark" data-lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>U Festival</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f03228">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="U Festival">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <!-- Prevent flash of wrong theme/lang -->
    <script>
        (function () {
            var t = localStorage.getItem('ufestival-theme') || 'dark';
            var l = localStorage.getItem('ufestival-lang') || 'nl';
            document.documentElement.dataset.theme = t;
            document.documentElement.dataset.lang = l;
            document.documentElement.lang = l === 'nl' ? 'nl' : 'en';
        })();
    </script>
</head>
<body>
    <div class="app-screen">
        <header class="app-header">
            <div class="header-left">
                <img class="brand-logo" src="svg_files/logo_white.svg" alt="U Festival logo">
                <span class="title-text">FESTIVAL</span>
            </div>
            <div class="header-right">
                <button class="icon-btn theme-btn" id="theme-toggle" aria-label="Schakel lichte modus">
                    <img src="svg_files/light_mode.svg" alt="Toggle theme">
                </button>
                <button class="icon-btn lang-btn" id="lang-toggle" data-label="NL" aria-label="Switch to English">
                    <img class="flag-logo" id="flag-icon" src="svg_files/nederland_flag.svg" alt="NL">
                </button>
            </div>
        </header>

        <main class="wireframe-body scrollable-body">
            <section class="wireframe-card hero-card">
                <span class="hero-label" data-i18n="home.welcome">WELKOM OP HET</span>
                <h1>U FESTIVAL</h1>
            </section>

            <div class="news-section">
                <span class="section-label">UPDATES</span>
                <h2 class="section-title" data-i18n="home.news.title">NIEUWS & MELDINGEN</h2>

                <div class="news-empty-state">
                    <div class="news-empty-icon">📭</div>
                    <p class="news-empty-title" data-i18n="home.news.empty.title">Nog geen berichten</p>
                    <p class="news-empty-sub" data-i18n="home.news.empty.sub">Tijdens het festival verschijnen hier live updates, meldingen en nieuws.</p>
                </div>

            </div>
        </main>

        <nav class="bottom-nav" aria-label="Navigatie">
            <a href="index.html" class="nav-item active">
                <img class="nav-logo" src="svg_files/home_logo.svg" alt="Home">
                <span class="nav-label" data-i18n="nav.home">Home</span>
            </a>
            <a href="pages/info.html" class="nav-item">
                <img class="nav-logo" src="svg_files/info_logo.svg" alt="Info">
                <span class="nav-label" data-i18n="nav.info">Info</span>
            </a>
            <a href="pages/schedule.html" class="nav-item">
                <img class="nav-logo" src="svg_files/music_logo.svg" alt="Line-up">
                <span class="nav-label" data-i18n="nav.lineup">Line-up</span>
            </a>
            <a href="pages/map.html" class="nav-item">
                <img class="nav-logo" src="svg_files/map_logo.svg" alt="Kaart">
                <span class="nav-label" data-i18n="nav.map">Kaart</span>
            </a>
        </nav>
    </div>
    <script src="./app.js"></script>
</body>
</html>
