<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>U Festival</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-screen">
        <header class="app-header">
            <div class="header-left">
                <img class="brand-logo" src="logo_white.svg" alt="U Festival logo">
                <span class="title-text"> Festival</span>
            </div>
            <div class="header-right">
                <button class="icon-button" aria-label="Tips">💡</button>
                <button class="icon-button" aria-label="Taal">🇳🇱</button>
            </div>
        </header>

        <main class="wireframe-body">
            <section class="wireframe-card hero-card">
                <span class="hero-label">WELCOME TO</span>
                <h1>U FESTIVAL</h1>
            </section>
            <section class="wireframe-card empty-card"></section>
            <section class="wireframe-card empty-card"></section>
        </main>

        <nav class="bottom-nav" aria-label="Navigatie">
            <button class="nav-item active">
                <img class="nav-logo" src="home_logo.svg" alt="Line-up">
            </button>
            <button class="nav-item">
                <img class="nav-logo" src="info_logo.svg" alt="Line-up">
            </button>
            <button class="nav-item">
                <img class="nav-logo" src="music_logo.svg" alt="Line-up">
            </button>
            <button class="nav-item">
                <img class="nav-logo" src="map_logo.svg" alt="Line-up">
            </button>
        </nav>
    </div>
</body>

</html>
